name: Build INRU Browser

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install --frozen-lockfile
      
      - name: Build Windows App
        run: npm run build:win
        # Команда из package.json: "build:win": "electron-builder --win"
        
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: inru-browser-windows
          path: dist/*
          retention-days: 7

  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install --frozen-lockfile
      
      - name: Sync Capacitor (Android)
        run: npx cap sync android
        # Синхронизирует веб-код с Android проектом
      
      - name: Upload Android Project
        uses: actions/upload-artifact@v4
        with:
          name: android-project
          path: platforms/android/
          retention-days: 7
