name: Build INRU Browser

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-desktop:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install --frozen-lockfile
      
      - name: Build Desktop App
        run: npm run build || yarn build || echo "Check package.json for build script"
        
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: dist/*
          retention-days: 7

  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install --frozen-lockfile
      
      - name: Add Android platform
        run: npx cap add android
      
      - name: Build Android APK
        run: npx cap copy android && npx cap open android
        # ⚠️ Для полной сборки APK нужно использовать CI/CD команды ниже:
        # run: npx cap sync android && npx cap run android
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: platforms/android/app/build/outputs/apk/release/*.apk
          retention-days: 7
